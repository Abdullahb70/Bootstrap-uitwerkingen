<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opdrachten les 6 - Buttons in Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <button class="btn btn-primary">Blauwe knop</button>
    <button class="btn btn-success">Groene knop</button>
    <button class="btn btn-danger">Rode knop</button>
    <button class="btn btn-link">Link knop</button>
    <button class="btn btn-lg btn-warning">Grote button</button>
    <button class="btn btn-sm btn-warning">Kleine button</button>
    <button class="btn btn-outline-success">Knop met groene rand</button>
    <button class="btn btn-primary" disabled>Uitgeschakeld Button</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
