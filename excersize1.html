<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opdrachten les 4 - Image stijling in Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid bg-success">
        <div class="row">
            <div class="col-md-4 border">
                <img class="rounded" src="img/Macbook_Air.jpg" alt="Afbeelding een Macbook Air" width="100%">
            </div>

            <div class="col-md-4 border">
                <img class="img-thumbnail" src="img/Macbook_Air.jpg" alt="Afbeelding een Macbook Air" width="100%">
            </div>

            <div class="col-md-4 border">
                <img class="rounded-circle" src="img/Macbook_Air.jpg" alt="Afbeelding een Macbook Air" width="100%">
            </div>
        </div>
        <div class="row">
            <div class="col border">
                <img class="d-block mx-auto" src="img/Macbook_Air.jpg" alt="Afbeelding een Macbook Air" width="100%">
            </div>
            <div class="row">
                <div class="col border">
                    <img class="d-block mx-auto img-fluid" src="img/Macbook_Air.jpg" alt="Afbeelding een Macbook Air">
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
