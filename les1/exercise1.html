        <div class="row">
            <div class="col border">
                Kolom 1
            </div>
            <div class="col border">
                <p>Deze rij met de kolommen zijn aangeroepen met de Bootstrap class .container</p>
                <p>Met deze container is de schermbreedte 100%, totdat Breakpoint small(576px of groter) is bereikt</p>
            </div>
            <div class="col border">
                Kolom 3
            </div>
        </div>
    </div>
